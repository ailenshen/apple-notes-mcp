name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. macOS 26.0
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: e.g. 24.0.0
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport mode
      options:
        - stdio
        - HTTP
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error logs
      render: shell
